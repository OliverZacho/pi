<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#ecf8ff;padding:48px 16px;">
  <tr>
    <td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:440px;background-color:#ffffff;border-radius:20px;padding:40px 36px;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;text-align:left;">
        <tr>
          <td style="font-size:20px;font-weight:600;color:#0f172a;padding-bottom:28px;">Pirol</td>
        </tr>
        <tr>
          <td style="font-size:17px;font-weight:600;color:#0f172a;padding-bottom:10px;">Confirm your new email</td>
        </tr>
        <tr>
          <td style="font-size:14px;color:#64748b;line-height:1.6;padding-bottom:28px;">Click the button below to confirm changing your email address to {{ .NewEmail }}.</td>
        </tr>
        <tr>
          <td style="padding-bottom:28px;">
            <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=email_change&next=/settings" style="display:inline-block;background-color:#0f172a;color:#ffffff;font-size:14px;font-weight:500;text-decoration:none;border-radius:999px;padding:12px 28px;">Confirm email change</a>
          </td>
        </tr>
        <tr>
          <td style="font-size:13px;color:#94a3b8;line-height:1.6;border-top:1px solid #e2e8f0;padding-top:24px;">If you didn&rsquo;t request this change, you can safely ignore this email.</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
